name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"
  # Shared Linux apt deps — keep release.yml in sync via the same variable name.
  LINUX_APT_DEPS: >-
    libwebkit2gtk-4.1-dev
    librsvg2-dev
    patchelf
    libgtk-3-dev
    libayatana-appindicator3-dev

jobs:
  test:
    name: Test (Rust)
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux deps (for desktop crate check)
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend dist (required by tauri generate_context)
        working-directory: apps/desktop
        run: pnpm build

      - name: Run unit + E2E tests
        run: cargo test --workspace --exclude agent-deck-desktop --verbose

      - name: Check desktop crate compiles
        run: cargo check -p agent-deck-desktop

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --exclude agent-deck-desktop --all-targets -- -D warnings
