name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional label for artifacts (e.g. v0.1.0-dev)"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"
  # Shared Linux apt deps — keep ci.yml in sync via the same variable name.
  LINUX_APT_DEPS: >-
    libwebkit2gtk-4.1-dev
    librsvg2-dev
    patchelf
    libgtk-3-dev
    libayatana-appindicator3-dev

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            os: macos-14
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          # macos-13 is retired from GitHub-hosted runners; macos-15 (ARM64) cross-compiles
          # the x86_64-apple-darwin target via the rustup target installed above.
          - platform: macos-x86_64
            os: macos-15
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-x86_64
            os: windows-latest
            args: ""
            rust_target: ""
          - platform: linux-x86_64
            os: ubuntu-22.04
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: ${{ matrix.platform }}

      - name: Install Linux system deps
        if: matrix.platform == 'linux-x86_64'
        run: |
          sudo apt-get update
          # $LINUX_APT_DEPS mirrors ci.yml; libssl-dev/libxdo-dev are release-only bundling extras.
          sudo apt-get install -y \
            ${{ env.LINUX_APT_DEPS }} \
            libssl-dev \
            libxdo-dev

      - name: Install frontend deps (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      - name: Collect artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-out
          # Only pick real bundles from target/.../bundle/ — avoid rustc build_script_build noise.
          while IFS= read -r f; do
            cp -v "$f" "dist-out/$(basename "$f")"
          done < <(find target -type f -path "*/bundle/*" \( -name "*.dmg" -o -name "*.app.tar.gz" \) 2>/dev/null || true)
          # Fallback: if no .dmg/.app.tar.gz upstream, tar the .app bundle so a runnable artifact still ships.
          if [ -z "$(ls -A dist-out 2>/dev/null || true)" ]; then
            echo "::warning::No .dmg/.app.tar.gz found under bundle/; falling back to .app tar."
            app_dir=$(find target -type d -name "*.app" -path "*/bundle/*" | head -n1 || true)
            if [ -n "$app_dir" ]; then
              tar -czf "dist-out/$(basename "$app_dir").tar.gz" -C "$(dirname "$app_dir")" "$(basename "$app_dir")"
            else
              echo "::error::No .app bundle found either; artifact will be empty."
            fi
          fi
          ls -la dist-out || true

      - name: Collect artifacts (Windows)
        if: matrix.platform == 'windows-x86_64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-out | Out-Null
          # Restrict to target\...\bundle\ and to named installers — a bare *.exe would
          # pick up NSIS intermediates (e.g. *-setup.7z.exe sidecar), not real installers.
          Get-ChildItem -Path target -Recurse -Directory -Filter bundle -ErrorAction SilentlyContinue |
            Get-ChildItem -Recurse -File -Include *.msi,*-setup.exe,*.nsis.zip -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName dist-out/ -Force; $_.FullName }
          Get-ChildItem dist-out -ErrorAction SilentlyContinue

      - name: Collect artifacts (Linux)
        if: matrix.platform == 'linux-x86_64'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-out
          while IFS= read -r f; do
            cp -v "$f" "dist-out/$(basename "$f")"
          done < <(find target -type f -path "*/bundle/*" \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) 2>/dev/null || true)
          ls -la dist-out || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-deck-${{ matrix.platform }}
          path: dist-out/*
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -print
          find artifacts -type f -exec cp -v {} release-assets/ \;
          ls -la release-assets

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
